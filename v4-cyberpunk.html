<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maria & The Robot Garden - Mod: Cyberpunk</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;font-family:monospace}
#game-container{width:100vw;height:100vh;display:flex;justify-content:center;align-items:center}
.cyber-controls{position:fixed;bottom:20px;display:flex;gap:15px;z-index:100}
.cyber-btn{background:linear-gradient(180deg,#00fff5,#0088ff);border:2px solid #00fff5;color:#000;padding:15px 25px;font-size:16px;font-weight:bold;border-radius:0;box-shadow:0 0 15px #00fff5}
.cyber-btn:active{background:linear-gradient(180deg,#00cccc,#0066cc)}
@media(min-width:768px){.cyber-controls{display:none}}
</style>
</head>
<body>
<div id="game-container"></div>
<div class="cyber-controls">
<button class="cyber-btn" ontouchstart="keys.left=1" ontouchend="keys.left=0">◄</button>
<button class="cyber-btn" ontouchstart="keys.up=1" ontouchend="keys.up=0">▲</button>
<button class="cyber-btn" ontouchstart="keys.down=1" ontouchend="keys.down=0">▼</button>
<button class="cyber-btn" ontouchstart="keys.right=1" ontouchend="keys.right=0">►</button>
<button class="cyber-btn" ontouchstart="keys.z=1" ontouchend="keys.z=0">Z</button>
</div>
<script>
// MOD 1: CYBERPUNK EDITION
// Custom mechanics + External assets mix
let keys={up:0,down:0,left:0,right:0,z:0};

class CyberBoot extends Phaser.Scene{
constructor(){super({key:'CyberBoot'})}
preload(){
this.load.image('neon-bg','https://labs.phaser.io/assets/skies/neon.png');
this.load.image('cyborg','https://labs.phaser.io/assets/sprites/cyborg.png');
this.load.image('mech','https://labs.phaser.io/assets/sprites/mech.png');
this.load.image('probe','https://labs.phaser.io/assets/sprites/probe.png');
this.load.image('baddie1','https://labs.phaser.io/assets/sprites/shmup-baddie1.png');
this.load.image('baddie2','https://labs.phaser.io/assets/sprites/shmup-baddie2.png');
this.load.image('laser','https://labs.phaser.io/assets/sprites/laser.png');
this.load.image('ufo','https://labs.phaser.io/assets/sprites/ufo.png');
this.load.image('helicopter','https://labs.phaser.io/assets/sprites/helicopter.png');
this.load.image('bank','https://labs.phaser.io/assets/sprites/bank.png');
this.load.image('crate','https://labs.phaser.io/assets/sprites/crate32.png');
}
create(){
this.data={player:{hp:200,maxHp:200,energy:150,maxEnergy:150,credits:500,level:1},upgrades:{speed:1,damage:1,shield:0}};
this.scene.start('CyberTitle',this.data);
}
}

class CyberTitle extends Phaser.Scene{
constructor(){super({key:'CyberTitle'})}
init(d){this.s=d}
create(){
this.add.image(400,300,'neon-bg');
// Scanline effect
for(let i=0;i<20;i++){
let l=this.add.rectangle(400,i*30,800,2,0x00fff5,0.1);
this.tweens.add({targets:l,alpha:0,repeat:-1,yoyo:true,duration:500});
}
this.add.text(400,120,'MARIA & THE\nROBOT GARDEN',{fontFamily:'monospace',fontSize:'32px',color:'#00fff5',align:'center'}).setOrigin(0.5);
this.add.text(400,280,'>> INICIAR SISTEMA',{fontFamily:'monospace',fontSize:'24px',color:'#ff00ff'}).setOrigin(0.5);
this.add.text(400,330,'   UPGRADES',{fontFamily:'monospace',fontSize:'20px',color:'#00fff5'}).setOrigin(0.5);
this.add.text(400,370,'   MEJORAS',{fontFamily:'monospace',fontSize:'20px',color:'#00fff5'}).setOrigin(0.5);
this.add.text(400,550,'MOD 1: CYBERPUNK',{fontSize:'14px',color:'#666'}).setOrigin(0.5);
this.opt=0;
this.input.keyboard.on('keydown',(e)=>{
if(e.key==='ArrowUp'||e.key==='ArrowDown'){
this.opt=this.opt?0:1;
this.add.text(400,280,'>> INICIAR SISTEMA',{fontFamily:'monospace',fontSize:'24px',color:this.opt?'#00fff5':'#ff00ff'}).setOrigin(0.5);
}
if(e.key==='Enter'){
this.cameras.main.flash(200,0,255,245);
this.time.delayedCall(200,()=>this.scene.start('CyberCity',this.s));
}
});
}
update(){if(keys.z){keys.z=0;this.scene.start('CyberCity',this.s)}}
}

class CyberCity extends Phaser.Scene{
constructor(){super({key:'CyberCity'})}
init(d){this.s=d}
create(){
this.add.image(400,300,'bank');
// Buildings
for(let i=0;i<8;i++){
let b=this.add.rectangle(100+i*100,200+Math.random()*200,80,150+Math.random()*150,0x1a1a2e,0.8).setStrokeStyle(2,0x00fff5);
b.setInteractive();
b.on('pointerdown',()=>this.enterBuilding(i));
}
// Player
this.player=this.physics.add.sprite(400,500,'cyborg');
this.player.setCollideWorldBounds(true);
// Enemies
this.drones=this.physics.add.group();
for(let i=0;i<6;i++){
let d=this.drones.create(Phaser.Math.Between(100,700),Phaser.Math.Between(50,350),'baddie'+Phaser.Math.Between(1,2));
d.setBounce(1);d.setCollideWorldBounds(true);d.setVelocity(Phaser.Math.Between(-60,60),Phaser.Math.Between(-60,60));
}
// Collectibles
this.credits=this.physics.add.group();
for(let i=0;i<8;i++){
let c=this.credits.create(Phaser.Math.Between(50,750),Phaser.Math.Between(50,550),'probe');
c.setBounceY(0.5);
}
this.physics.add.overlap(this.player,this.credits,(p,c)=>{c.disableBody(true,true);this.s.player.credits+=50});
this.physics.add.collider(this.player,this.drones,(p,d)=>{this.cam.shake(80,0.01);this.s.player.hp-=10});
// UI
this.add.rectangle(400,30,800,60,0x000,0.9);
this.hpBar=this.add.graphics();
this.energyBar=this.add.graphics();
this.credText=this.add.text(650,10,'CREDITS: '+this.s.player.credits,{fontSize:'18px',color:'#00fff5'});
this.lvlText=this.add.text(650,40,'LEVEL: '+this.s.player.level,{fontSize:'18px',color:'#ff00ff'});
// Shop
this.shopOpen=false;
}
enterBuilding(id){
const shops=['ARMA','ESCUDO','VELOCIDAD','ENERGIA'];
this.showMsg('ENTRANDO: '+shops[id%4]);
}
showMsg(txt){
this.add.text(400,300,txt,{fontSize:'24px',color:'#00fff5',backgroundColor:'#000'}).setOrigin(0.5);
}
update(){
const v=180*this.s.data.upgrades.speed;
if(keys.left)this.player.setVelocityX(-v);
else if(keys.right)this.player.setVelocityX(v);
else this.player.setVelocityX(0);
if(keys.up)this.player.setVelocityY(-v);
else if(keys.down)this.player.setVelocityY(v);
else this.player.setVelocityY(0);
if(keys.z){
keys.z=0;
let l=this.add.image(this.player.x,this.player.y-20,'laser');
l.setVelocityY(-500);
l.setTint(0x00fff5);
this.s.player.energy-=5;
}
this.drones.children.iterate(d=>{if(d.active)d.rotation+=0.03});
// Bars
this.hpBar.clear();
this.hpBar.fillStyle(0xff0000,1);
this.hpBar.fillRect(10,10,this.s.player.hp*2,15);
this.energyBar.clear();
this.energyBar.fillStyle(0x00fff5,1);
this.energyBar.fillRect(10,30,this.s.player.energy*2,15);
this.credText.setText('CREDITS: '+this.s.player.credits);
}
}

new Phaser.Game({
type:Phaser.AUTO,width:800,height:600,parent:'game-container',
scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
physics:{default:'arcade',gravity:{y:0}},
scene:[CyberBoot,CyberTitle,CyberCity]
});
</script>
</body>
</html>
