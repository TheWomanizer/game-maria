<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maria & The Robot Garden</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0f0c29;overflow:hidden;touch-action:none;font-family:'VT323',monospace;user-select:none}
#game-container{width:100vw;height:100vh;display:flex;justify-content:center;align-items:center}
.touch-controls{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:space-between;padding:0 20px;pointer-events:none;z-index:100}
.dpad{display:grid;grid-template-columns:repeat(3,50px);grid-template-rows:repeat(2,50px);gap:5px;pointer-events:auto}
.dpad button{background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);border-radius:10px;color:#fff;font-size:24px;touch-action:manipulation}
.dpad button:active{background:rgba(255,255,255,0.4)}
.action-btns{display:flex;gap:10px;pointer-events:auto}
.action-btns button{background:linear-gradient(45deg,#e94560,#ff6b9d);border:none;border-radius:10px;padding:15px 20px;color:#fff;font-family:'VT323',monospace;font-size:18px;touch-action:manipulation}
.action-btns button:active{transform:scale(0.95)}
@media(min-width:768px){.touch-controls{display:none}}
</style>
</head>
<body>
<div id="game-container"></div>
<div class="touch-controls">
<div class="dpad">
<button></button><button onclick="input.up=true" ontouchstart="input.up=true" ontouchend="input.up=false">↑</button><button></button>
<button onclick="input.left=true" ontouchstart="input.left=true" ontouchend="input.left=false">←</button>
<button onclick="input.down=true" ontouchstart="input.down=true" ontouchend="input.down=false">↓</button>
<button onclick="input.right=true" ontouchstart="input.right=true" ontouchend="input.right=false">→</button>
</div>
<div class="action-btns">
<button onclick="input.action=true" ontouchstart="input.action=true" ontouchend="input.action=false">A</button>
<button onclick="input.menu=true" ontouchstart="input.menu=true" ontouchend="input.menu=false">M</button>
</div>
</div>
<script>
let input = {up:false,down:false,left:false,right:false,action:false,menu:false};
let cursors;

class BootScene extends Phaser.Scene {
    constructor() { super({key:'BootScene'}); }
    preload() {
        this.load.image('title_bg', 'https://labs.phaser.io/assets/skies/space3.png');
        this.load.image('world_grass', 'https://labs.phaser.io/assets/skies/grassland.png');
        this.load.image('house', 'https://labs.phaser.io/assets/sprites/house.png');
        this.load.image('garden', 'https://labs.phaser.io/assets/sprites/garden.png');
        this.load.image('crate', 'https://labs.phaser.io/assets/sprites/crate32.png');
        this.load.image('platform', 'https://labs.phaser.io/assets/sprites/platform.png');
        this.load.spritesheet('player', 'https://labs.phaser.io/assets/sprites/dude.png', {frameWidth:32, frameHeight:48});
        this.load.image('npc_jose', 'https://labs.phaser.io/assets/sprites/knight.png');
        this.load.image('npc_celeste', 'https://labs.phaser.io/assets/sprites/panda.png');
        this.load.image('npc_robot', 'https://labs.phaser.io/assets/sprites/frog.png');
        this.load.image('church_bg', 'https://labs.phaser.io/assets/skies/castle.png');
        this.load.image('altar', 'https://labs.phaser.io/assets/sprites/diamond.png');
        this.load.image('pew', 'https://labs.phaser.io/assets/sprites/bunny.png');
        this.load.image('arcade_bg', 'https://labs.phaser.io/assets/skies/neon.png');
        this.load.image('machine', 'https://labs.phaser.io/assets/sprites/bank.png');
        this.load.spritesheet('fighter1', 'https://labs.phaser.io/assets/sprites/alien.png', {frameWidth:32, frameHeight:32});
        this.load.image('fighter2', 'https://labs.phaser.io/assets/sprites/shmup-baddie2.png');
        this.load.image('laser', 'https://labs.phaser.io/assets/sprites/laser.png');
        this.load.image('particle', 'https://labs.phaser.io/assets/sprites/star.png');
        this.load.image('heart', 'https://labs.phaser.io/assets/sprites/diamond.png');
        this.load.image('coin', 'https://labs.phaser.io/assets/sprites/star.png');
        this.load.image('potion', 'https://labs.phaser.io/assets/sprites/potion.png');
    }
    create() {
        this.anims.create({key: 'player_walk', frames: this.anims.generateFrameNumbers('player', {start:0, end:9}), frameRate: 10, repeat: -1});
        this.anims.create({key: 'player_idle', frames: [{key:'player', frame:0}], frameRate: 10});
        this.anims.create({key: 'fighter_attack', frames: this.anims.generateFrameNumbers('fighter1', {start:0, end:5}), frameRate: 15});
        this.gameState = {player:{hp:100,maxHp:100,mp:50,maxMp:50,gold:0,exp:0,level:1,xpToNext:100,tickets:0},inventory:{potions:2,keys:1},locations:{church:false,arcade:false,robot:false,house:false,ranch:false},story:{metJose:false,metCeleste:false,foundRobot:false,enteredChurch:false,playedArcade:false},upgrades:{damage:1.0,speed:1.0,extraJump:0},battleWins:0,battleLosses:0,combo:0};
        this.registry.set('gameState', this.gameState);
        this.scene.start('TitleScene');
    }
}

class TitleScene extends Phaser.Scene {
    constructor() { super({key:'TitleScene'}); }
    create() {
        this.add.image(400, 300, 'title_bg');
        this.add.rectangle(400, 300, 800, 600, 0x000000, 0.5);
        const title = this.add.text(400, 150, 'MARIA & THE\nROBOT GARDEN', {fontFamily:'"Press Start 2P"',fontSize:'28px',color:'#ff6b9d',align:'center'}).setOrigin(0.5);
        this.tweens.add({targets: title, scale: 1.05, duration: 1000, yoyo: true, repeat: -1});
        this.add.text(400, 250, 'A Cozy RPG Adventure', {fontFamily:'"VT323"',fontSize:'24px',color:'#aaa'}).setOrigin(0.5);
        this.menuItems = ['NUEVO JUEGO','CONTINUAR','ARCADE','CREDITOS'];
        this.menuIndex = 0; this.menuTexts = [];
        this.menuItems.forEach((item, i) => {
            let t = this.add.text(400, 320 + i * 45, item, {fontFamily:'"VT323"',fontSize:'28px',color:i===0?'#ffd700':'#ffffff'}).setOrigin(0.5);
            this.menuTexts.push(t);
        });
        this.add.text(400, 550, 'Version 1: Phaser Labs Assets', {fontSize:'14px',color:'#666'}).setOrigin(0.5);
        this.input.keyboard.on('keydown-UP', () => this.moveMenu(-1));
        this.input.keyboard.on('keydown-DOWN', () => this.moveMenu(1));
        this.input.keyboard.on('keydown-ENTER', () => this.selectMenu());
        for(let i = 0; i < 20; i++) {let p = this.add.image(Phaser.Math.Between(50,750),Phaser.Math.Between(50,550),'particle');p.setAlpha(0.3);p.setTint(0xff69b4);this.tweens.add({targets:p,y:p.y-50,alpha:0,duration:3000,repeat:-1,delay:i*150});}
    }
    moveMenu(dir) {this.menuTexts[this.menuIndex].setColor('#ffffff');this.menuIndex=(this.menuIndex+dir+4)%4;this.menuTexts[this.menuIndex].setColor('#ffd700');}
    selectMenu() {
        const state = this.registry.get('gameState');
        if(this.menuIndex===0||this.menuIndex===1){this.cameras.main.flash(500,255,107,157);this.time.delayedCall(500,()=>this.scene.start('WorldScene',state));}
        else if(this.menuIndex===2){this.scene.start('ArcadeLobby',state);}
        else if(this.menuIndex===3){this.scene.start('CreditsScene');}
    }
    update() {if(input.up){input.up=false;this.moveMenu(-1);}if(input.down){input.down=false;this.moveMenu(1);}if(input.action){input.action=false;this.selectMenu();}}
}

class WorldScene extends Phaser.Scene {
    constructor() { super({key:'WorldScene'}); }
    init(data){this.gameState=data||this.registry.get('gameState');}
    create() {
        this.add.image(400, 300, 'world_grass');
        for(let i=0;i<10;i++){let c=this.add.image(Phaser.Math.Between(50,750),Phaser.Math.Between(50,550),'crate');c.setAlpha(0.5);}
        const locations=[{id:'robot',x:150,y:150,name:'Jardin del Robot',color:0x3498db,npc:'jose',sprite:'npc_jose'},{id:'ranch',x:150,y:450,name:'Rancho de Gatos',color:0xe74c3c,npc:'celeste',sprite:'npc_celeste'},{id:'arcade',x:650,y:150,name:'Arcade',color:0x9b59b6,sprite:'machine'},{id:'church',x:650,y:450,name:'Iglesia',color:0xf5f5f5,sprite:'altar'},{id:'house',x:400,y:300,name:'Tu Casa',color:0x2ecc71,sprite:'house'}];
        this.locationMarkers=[];
        locations.forEach(loc=>{
            let b=this.add.rectangle(loc.x,loc.y,80,60,loc.color).setStrokeStyle(3,0xffffff).setInteractive();
            b.on('pointerdown',()=>this.enterLocation(loc));
            this.add.text(loc.x,loc.y+45,loc.name,{fontSize:'12px',color:'#fff',backgroundColor:'#000'}).setOrigin(0.5);
            if(loc.npc){let n=this.add.image(loc.x,loc.y-20,loc.sprite).setInteractive();n.npcId=loc.npc;n.on('pointerdown',()=>this.talkToNPC(loc.npc));}
            this.locationMarkers.push({building:b,...loc});
        });
        this.player=this.physics.add.sprite(400,300,'player',0).setCollideWorldBounds(true);
        this.uiBg=this.add.rectangle(400,40,800,80,0x000000,0.7);
        this.hpText=this.add.text(20,15,`HP: ${this.gameState.player.hp}`,{fontSize:'18px',color:'#e74c3c'});
        this.mpText=this.add.text(20,40,`MP: ${this.gameState.player.mp}`,{fontSize:'18px',color:'#3498db'});
        this.goldText=this.add.text(250,15,`ORO: ${this.gameState.player.gold}`,{fontSize:'18px',color:'#ffd700'});
        this.levelText=this.add.text(250,40,`NIVEL: ${this.gameState.player.level}`,{fontSize:'18px',color:'#9b59b6'});
        this.ticketsText=this.add.text(450,15,`TIKETS: ${this.gameState.player.tickets}`,{fontSize:'18px',color:'#ff69b4'});
        this.dialogueBox=this.add.rectangle(400,520,750,120,0x000000,0.9).setStrokeStyle(4,0xffffff).setVisible(false);
        this.dialogueText=this.add.text(60,480,'',{fontSize:'18px',color:'#fff',wordWrap:700}).setVisible(false);
        this.dialogueOpen=false;
    }
    enterLocation(loc){
        const msgs={robot:"Bienvenido al Jardin del Robot. El robot esta esperando...",ranch:"Miau~ Bienvenido al Rancho de Gatos!",arcade:"ENTRA AL ARCADE! Presiona A para jugar",church:"La puerta de la iglesia esta abierta. Pulsa A para entrar.",house:"Esta es tu casa. Un lugar acogedor."};
        this.gameState.locations[loc.id]=true;
        if(loc.id==='arcade'&&input.action){this.scene.start('ArcadeLobby',this.gameState);return;}
        if(loc.id==='church'&&input.action){this.scene.start('ChurchScene',this.gameState);return;}
        if(loc.id==='house'){this.gameState.player.hp=this.gameState.player.maxHp;this.gameState.player.mp=this.gameState.player.maxMp;this.showDialogue("Descansas en tu casa! HP y MP restaurados.");return;}
        this.showDialogue(msgs[loc.id]);
    }
    talkToNPC(npcId){
        const d={jose:["Hola! Soy Jose. Te he estado esperando.","El robot necesita energia. Puedes ayudarme?","Gracias por tu ayuda! Eres un verdadero heroe."],celeste:["Miau! Soy Celeste. Bienvenido al Rancho de Gatos!","Los gatos estan muy felices hoy.","Te quiero mucho, amigo."],robot:["BEEP BOOP... Sistema de traduccion activado.","Mi nombre es JARVIS. Estoy diseñado para ayudarte."]};
        const txt=d[npcId]?d[npcId][Phaser.Math.Between(0,d[npcId].length-1)]:"...";
        if(npcId==='jose')this.gameState.story.metJose=true;
        if(npcId==='celeste')this.gameState.story.metCeleste=true;
        if(npcId==='robot')this.gameState.story.foundRobot=true;
        this.showDialogue(npcId.toUpperCase()+': "'+txt+'"');
    }
    showDialogue(text){this.dialogueText.setText(text);this.dialogueBox.setVisible(true);this.dialogueText.setVisible(true);this.dialogueOpen=true;this.time.delayedCall(4000,()=>{this.dialogueBox.setVisible(false);this.dialogueText.setVisible(false);this.dialogueOpen=false;});}
    update(){
        const speed=160*this.gameState.upgrades.speed;
        if(cursors=this.input.keyboard.createCursorKeys()){
            let moving=false;
            if(cursors.left.isDown||input.left){this.player.setVelocityX(-speed);this.player.flipX=true;moving=true;}
            else if(cursors.right.isDown||input.right){this.player.setVelocityX(speed);this.player.flipX=false;moving=true;}
            else{this.player.setVelocityX(0);}
            if(cursors.up.isDown||input.up){this.player.setVelocityY(-speed);moving=true;}
            else if(cursors.down.isDown||input.down){this.player.setVelocityY(speed);moving=true;}
            else{this.player.setVelocityY(0);}
            if(moving)this.player.anims.play('player_walk',true);else this.player.anims.play('player_idle');
        }
        if(input.menu){input.menu=false;this.scene.start('ArcadeLobby',this.gameState);}
        if(input.action&&this.dialogueOpen){input.action=false;this.dialogueBox.setVisible(false);this.dialogueText.setVisible(false);this.dialogueOpen=false;}
        this.hpText.setText(`HP: ${this.gameState.player.hp}/${this.gameState.player.maxHp}`);
        this.mpText.setText(`MP: ${this.gameState.player.mp}/${this.gameState.player.maxMp}`);
        this.goldText.setText(`ORO: ${this.gameState.player.gold}`);
        this.levelText.setText(`NIVEL: ${this.gameState.player.level}`);
        this.ticketsText.setText(`TIKETS: ${this.gameState.player.tickets}`);
    }
}

class ChurchScene extends Phaser.Scene {
    constructor() { super({key:'ChurchScene'}); }
    init(data){this.gameState=data;}
    create(){
        this.add.image(400,300,'church_bg');
        this.add.rectangle(400,300,800,600,0x000000,0.3);
        this.add.image(400,150,'altar').setScale(2);
        for(let i=0;i<4;i++)this.add.image(250+i*100,350,'pew');
        for(let i=0;i<5;i++)this.add.rectangle(100+i*150,80,40,100,Phaser.Math.RND.pick([0xe74c3c,0x3498db,0x2ecc71,0xf1c40f])).setAlpha(0.5);
        this.add.image(400,250,'npc_jose').setScale(1.5);
        this.add.rectangle(400,550,750,80,0x000000,0.8);
        this.add.text(400,530,'Presiona A para orar | ESC para salir',{fontSize:'16px',color:'#fff'}).setOrigin(0.5);
    }
    update(){
        if(input.action){input.action=false;this.gameState.player.hp=Math.min(this.gameState.player.hp+50,this.gameState.player.maxHp);this.showMessage("Has orado! +50 HP");}
        if(input.menu){input.menu=false;this.scene.start('WorldScene',this.gameState);}
    }
    showMessage(msg){let t=this.add.text(400,400,msg,{fontSize:'24px',color:'#ffd700',backgroundColor:'#000'}).setOrigin(0.5);this.tweens.add({targets:t,alpha:0,y:t.y-50,duration:2000,onComplete:()=>t.destroy()});}
}

class ArcadeLobby extends Phaser.Scene {
    constructor() { super({key:'ArcadeLobby'}); }
    init(data){this.gameState=data;}
    create(){
        this.add.image(400,300,'arcade_bg');
        for(let i=0;i<20;i++){let l=this.add.rectangle(400,i*30,800,2,0x00fff5,0.1);this.tweens.add({targets:l,alpha:0,repeat:-1,yoyo:true,duration:500});}
        this.add.text(400,80,'ARCADE',{fontFamily:'"Press Start 2P"',fontSize:'32px',color:'#00fff5'}).setOrigin(0.5);
        const machines=[{id:'fight',name:'ROBOT FIGHT',x:200,color:0xff0066},{id:'puzzle',name:'PIXEL PUZZLE',x:400,color:0x00ff66},{id:'racing',name:'SPACE RACE',x:600,color:0xff6600}];
        machines.forEach(m=>{let r=this.add.rectangle(m.x,300,120,150,m.color).setStrokeStyle(3,0xffffff).setInteractive();r.on('pointerdown',()=>this.playGame(m.id));this.add.text(m.x,300,m.name,{fontSize:'14px',color:'#fff'}).setOrigin(0.5);});
        this.add.rectangle(400,500,300,60,0x000000,0.8);
        this.ticketsText=this.add.text(400,500,`TIKETS: ${this.gameState.player.tickets}`,{fontSize:'24px',color:'#ff69b4'}).setOrigin(0.5);
        this.add.text(400,560,'Presiona A para seleccionar | ESC para salir',{fontSize:'14px',color:'#888'}).setOrigin(0.5);
        this.selectedMachine=0;
    }
    playGame(id){if(id==='fight')this.scene.start('FightingGame',this.gameState);else{let t=this.add.text(400,400,'Proximamente!',{fontSize:'32px',color:'#f00'}).setOrigin(0.5);this.tweens.add({targets:t,alpha:0,duration:1000,onComplete:()=>t.destroy()});}}
    update(){if(input.left){input.left=false;this.selectedMachine=(this.selectedMachine+2)%3;}if(input.right){input.right=false;this.selectedMachine=(this.selectedMachine+1)%3;}if(input.action){input.action=false;const ids=['fight','puzzle','racing'];this.playGame(ids[this.selectedMachine]);}if(input.menu){input.menu=false;this.scene.start('WorldScene',this.gameState);}}
}

class FightingGame extends Phaser.Scene {
    constructor() { super({key:'FightingGame'}); }
    init(data){this.gameState=data;}
    create(){
        this.add.image(400,300,'arcade_bg');
        this.add.rectangle(400,100,780,60,0x000000,0.8);
        this.p1HpBar=this.add.graphics();this.p2HpBar=this.add.graphics();
        this.p1Hp=100;this.p2Hp=100;
        this.player1=this.physics.add.sprite(200,400,'player',0);
        this.player2=this.physics.add.sprite(600,400,'fighter2');
        this.player1.setCollideWorldBounds(true);this.player2.setCollideWorldBounds(true);
        this.add.rectangle(400,550,750,80,0x000000,0.8);
        this.battleLog=this.add.text(50,525,'FIGHT!',{fontSize:'24px',color:'#ffd700'});
        this.comboText=this.add.text(600,30,'COMBO: 0',{fontSize:'20px',color:'#ff69b4'});
        this.gameState.combo=0;
        this.turnTimer=0;this.playerTurn=true;
    }
    update(){
        this.p1HpBar.clear();this.p1HpBar.fillStyle(0x00ff00,1);this.p1HpBar.fillRect(20,20,this.p1Hp*3,20);
        this.p2HpBar.clear();this.p2HpBar.fillStyle(0xff0000,1);this.p2HpBar.fillRect(400,20,this.p2Hp*3,20);
        if(this.playerTurn){
            if(input.action){input.action=false;this.p2Hp-=15;this.gameState.combo++;this.cameras.main.shake(100,0.01);this.battleLog.setText('P1 ATTACK! -15 HP');this.comboText.setText('COMBO: '+this.gameState.combo);let h=this.add.circle(600,400,30,0xff0000,0.7);this.tweens.add({targets:h,alpha:0,scale:2,duration:300,onComplete:()=>h.destroy()});this.playerTurn=false;}
        }else{this.turnTimer++;if(this.turnTimer>60){this.p1Hp-=Phaser.Math.Between(5,15);this.battleLog.setText('CPU ATTACK! -'+Math.min(15,this.p1Hp)+' HP');this.cameras.main.shake(100,0.015);this.gameState.combo=0;this.comboText.setText('COMBO: 0');this.turnTimer=0;this.playerTurn=true;}}
        if(this.p2Hp<=0){this.gameState.player.tickets+=10;this.add.text(400,300,'K.O.!',{fontSize:'64px',color:'#ffd700'}).setOrigin(0.5);this.time.delayedCall(2000,()=>this.scene.start('ArcadeLobby',this.gameState));}
        if(this.p1Hp<=0){this.add.text(400,300,'GAME OVER',{fontSize:'48px',color:'#ff0000'}).setOrigin(0.5);this.time.delayedCall(2000,()=>this.scene.start('ArcadeLobby',this.gameState));}
    }
}

class CreditsScene extends Phaser.Scene {
    constructor() { super({key:'CreditsScene'}); }
    create(){
        this.add.rectangle(400,300,800,600,0x000000);
        this.add.text(400,100,'CREDITOS',{fontFamily:'"Press Start 2P"',fontSize:'32px',color:'#ffd700'}).setOrigin(0.5);
        this.add.text(400,200,'MARIA & THE ROBOT GARDEN',{fontSize:'24px',color:'#fff'}).setOrigin(0.5);
        this.add.text(400,300,'Un juego creado con Phaser 3',{fontSize:'18px',color:'#aaa'}).setOrigin(0.5);
        this.add.text(400,350,'Assets de labs.phaser.io (CC0)',{fontSize:'16px',color:'#888'}).setOrigin(0.5);
        this.add.text(400,500,'Presiona A para volver',{fontSize:'18px',color:'#666'}).setOrigin(0.5);
    }
    update(){if(input.action||input.menu){input.action=false;input.menu=false;this.scene.start('TitleScene');}}
}

const config={type:Phaser.AUTO,width:800,height:600,parent:'game-container',scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},physics:{default:'arcade',arcade:{gravity:{y:0},debug:false}},scene:[BootScene,TitleScene,WorldScene,ChurchScene,ArcadeLobby,FightingGame,CreditsScene]};
new Phaser.Game(config);
</script>
</body>
</html>
