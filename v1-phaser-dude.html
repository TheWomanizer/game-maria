<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maria & The Robot Garden - Version 1: Phaser dude</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Courier New',monospace}
#game-container{border:4px solid #e94560;border-radius:8px;overflow:hidden}
.controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:100}
.btn{background:#e94560;color:#fff;border:none;padding:15px 25px;font-size:16px;border-radius:5px;cursor:pointer;touch-action:manipulation}
.btn:active{background:#c73e54}
@media(min-width:768px){.mobile-controls{display:none}}
.mobile-controls{display:flex;gap:10px}
</style>
</head>
<body>
<div id="game-container"></div>
<div class="controls">
<div class="mobile-controls">
<button class="btn" onmousedown="move('left')" ontouchstart="move('left')">←</button>
<button class="btn" onmousedown="move('up')" ontouchstart="move('up')">↑</button>
<button class="btn" onmousedown="move('down')" ontouchstart="move('down')">↓</button>
<button class="btn" onmousedown="move('right')" ontouchstart="move('right')">→</button>
<button class="btn" onmousedown="attack()" ontouchstart="attack()">ATACAR</button>
</div>
</div>
<script>
// VERSION 1: Phaser dude sprites (labs.phaser.io)
class MainScene extends Phaser.Scene{
constructor(){super({key:'MainScene'})}
preload(){
this.load.image('dude','https://labs.phaser.io/assets/sprites/phaser-dude.png');
this.load.image('platform','https://labs.phaser.io/assets/sprites/platform.png');
this.load.image('bomb','https://labs.phaser.io/assets/sprites/bomb.png');
this.load.image('star','https://labs.phaser.io/assets/sprites/star.png');
this.load.image('sky','https://labs.phaser.io/assets/skies/space3.png');
this.load.image('ship','https://labs.phaser.io/assets/sprites/shmup-baddie2.png');
this.load.image('laser','https://labs.phaser.io/assets/sprites/laser.png');
this.load.audio('hit',['https://labs.phaser.io/audio/SoundEffects/squit.wav']);
}
create(){
this.add.image(400,300,'sky');
const platforms=this.physics.add.staticGroup();
platforms.create(400,568,'platform').setScale(2).refreshBody();
platforms.create(600,400,'platform');
platforms.create(50,250,'platform');
platforms.create(750,220,'platform');
this.player=this.physics.add.sprite(100,450,'dude');
this.player.setBounce(0.2);
this.player.setCollideWorldBounds(true);
this.physics.add.collider(this.player,platforms);
this.cursors=this.input.keyboard.createCursorKeys();
this.enemies=this.physics.add.group();
for(let i=0;i<5;i++){
let e=this.enemies.create(Phaser.Math.Between(200,700),Phaser.Math.Between(100,300),'ship');
e.setCollideWorldBounds(true);
e.setBounce(1);
e.setVelocity(Phaser.Math.Between(-100,100),20);
}
this.coins=this.physics.add.group();
for(let i=0;i<10;i++){
let c=this.coins.create(Phaser.Math.Between(50,750),Phaser.Math.Between(50,350),'star');
c.setBounceY(Phaser.Math.FloatBetween(0.4,0.8));
}
this.physics.add.collider(this.coins,platforms);
this.physics.add.overlap(this.player,this.coins,this.collectCoin,null,this);
this.physics.add.collider(this.player,this.enemies,this.hitEnemy,null,this);
this.score=0;
this.scoreText=this.add.text(16,16,'MONEDAS: 0',{fontSize:'32px',fill:'#fff',fontFamily:'Courier'});
this.health=100;
this.healthText=this.add.text(16,50,'SALUD: 100',{fontSize:'32px',fill:'#e94560',fontFamily:'Courier'});
this.add.text(16,84,'Phaser Dude Version',{fontSize:'16px',fill:'#888'});
this.messageText=this.add.text(400,300,'',{fontSize:'24px',fill:'#fff',backgroundColor:'#000'}).setOrigin(0.5).setVisible(false);
}
collectCoin(player,coin){
coin.disableBody(true,true);
this.score+=10;
this.scoreText.setText('MONEDAS: '+this.score);
this.cameras.main.shake(100,0.005);
if(this.coins.countActive(true)===0){
this.messageText.setText('¡GANASTE!').setVisible(true);
this.time.delayedCall(3000,()=>this.scene.restart());
}
}
hitEnemy(player,enemy){
this.cameras.main.shake(200,0.02);
this.health-=20;
this.healthText.setText('SALUD: '+this.health);
enemy.disableBody(true,true);
if(this.health<=0){
this.messageText.setText('GAME OVER').setVisible(true);
this.physics.pause();
this.time.delayedCall(2000,()=>this.scene.restart());
}
}
update(){
if(this.cursors.left.isDown){this.player.setVelocityX(-160)}
else if(this.cursors.right.isDown){this.player.setVelocityX(160)}
else{this.player.setVelocityX(0)}
if(this.cursors.up.isDown&&this.player.body.touching.down){this.player.setVelocityY(-330)}
this.enemies.children.iterate((enemy)=>{
if(enemy.body){enemy.rotation+=0.01;
if(enemy.x<0||enemy.x>800){enemy.setVelocityX(-enemy.body.velocity.x)}
}
});
}
}
let config={type:Phaser.AUTO,width:800,height:600,parent:'game-container',physics:{default:'arcade',arcade:{gravity:{y:300},debug:false}},scene:[MainScene]};
let game=new Phaser.Game(config);
function move(dir){
let scene=game.scene.scenes[0];
if(!scene||!scene.player)return;
if(dir==='left')scene.player.setVelocityX(-160);
if(dir==='right')scene.player.setVelocityX(160);
if(dir==='up'&&scene.player.body.touching.down)scene.player.setVelocityY(-330);
if(dir==='down')scene.player.setVelocityY(100);
setTimeout(()=>scene.player.setVelocityX(0),100);
}
function attack(){
let scene=game.scene.scenes[0];
if(!scene||!scene.player)return;
let laser=scene.physics.add.image(scene.player.x,scene.player.y,'laser');
laser.setVelocityX(400);
scene.time.delayedCall(1000,()=>laser.destroy());
}
</script>
</body>
</html>
